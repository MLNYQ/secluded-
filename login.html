<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 | Secluded Bot</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: url('https://images.unsplash.com/photo-1519681393784-d120267933ba?ixlib=rb-4.0.3&auto=format&fit=crop&w=1920&q=80') no-repeat center center/cover;
            position: relative;
            overflow: hidden;
        }

        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.4);
            z-index: 0;
        }

        .wrapper {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 420px;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            box-shadow: 0 0 50px rgba(0, 0, 0, 0.5);
            border-radius: 20px;
            padding: 40px 35px;
            color: #fff;
            animation: fadeInUp 0.6s ease;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .wrapper h2 {
            font-size: 32px;
            text-align: center;
            font-weight: 600;
            margin-bottom: 8px;
            letter-spacing: 1px;
        }

        .wrapper .subtitle {
            text-align: center;
            font-size: 14px;
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 30px;
        }

        .input-field {
            position: relative;
            width: 100%;
            height: 50px;
            margin: 25px 0;
        }

        .input-field input {
            width: 100%;
            height: 100%;
            background: transparent;
            border: 2px solid rgba(255, 255, 255, 0.2);
            outline: none;
            border-radius: 40px;
            font-size: 15px;
            color: #fff;
            padding: 0 20px 0 45px;
            transition: all 0.3s ease;
        }

        .input-field input::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }

        .input-field input:focus,
        .input-field input:valid {
            border-color: rgba(255, 255, 255, 0.5);
            background: rgba(255, 255, 255, 0.05);
        }

        .input-field i {
            position: absolute;
            left: 18px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 18px;
            color: rgba(255, 255, 255, 0.6);
            transition: 0.3s;
        }

        .input-field input:focus ~ i,
        .input-field input:valid ~ i {
            color: #fff;
        }

        .btn {
            width: 100%;
            height: 50px;
            background: #fff;
            border: none;
            outline: none;
            border-radius: 40px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            color: #333;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-top: 10px;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.4);
            background: #f0f0f0;
        }

        .btn:active {
            transform: translateY(0);
        }

        .error-message {
            margin-top: 16px;
            padding: 12px 16px;
            background: rgba(248, 81, 73, 0.15);
            border: 1px solid rgba(248, 81, 73, 0.3);
            border-radius: 12px;
            color: #ff9a94;
            font-size: 13px;
            display: none;
            align-items: center;
            gap: 8px;
            backdrop-filter: blur(5px);
        }

        .error-message.show {
            display: flex;
        }

        .error-message i {
            font-size: 14px;
        }

        .brand-icon {
            width: 70px;
            height: 70px;
            background: rgba(255, 255, 255, 0.15);
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            font-size: 30px;
            color: #fff;
            backdrop-filter: blur(10px);
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }

        @media (max-width: 480px) {
            .wrapper {
                margin: 20px;
                padding: 30px 25px;
            }
            .wrapper h2 {
                font-size: 26px;
            }
        }
    </style>
</head>
<body>
    <div class="wrapper">
        <div class="brand-icon"><i class="fas fa-robot"></i></div>
        <h2>Secluded Bot</h2>
        <p class="subtitle">请输入管理密码继续</p>
        <form onsubmit="event.preventDefault(); login();">
            <div class="input-field">
                <input type="password" id="pwd" placeholder="输入密码..." required autofocus>
                <i class="fas fa-lock"></i>
            </div>
            <button type="submit" class="btn">
                <i class="fas fa-arrow-right-to-bracket"></i>登录面板
            </button>
        </form>
        <div class="error-message" id="error">
            <i class="fas fa-exclamation-circle"></i>
            <span>密码错误，请重试</span>
        </div>
    </div>

    <script>
        async function login() {
            const pwd = document.getElementById('pwd').value;
            const errorDiv = document.getElementById('error');
            try {
                const res = await fetch('/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: 'password=' + encodeURIComponent(pwd)
                });
                const data = await res.json();
                if (data.success) {
                    window.location.href = '/';
                } else {
                    errorDiv.classList.add('show');
                    setTimeout(() => errorDiv.classList.remove('show'), 3000);
                }
            } catch (e) {
                errorDiv.querySelector('span').textContent = '网络错误，请检查连接';
                errorDiv.classList.add('show');
                setTimeout(() => errorDiv.classList.remove('show'), 3000);
            }
        }
        document.getElementById('pwd').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') login();
        });
    </script>
</body>
</html>
